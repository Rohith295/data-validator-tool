[tox]
requires =
    tox>=4
env_list = lint, typecheck, py{311,312,313}, e2e-py{311,312,313}

[testenv]
description = Unit tests ({basepython})
deps =
    pytest>=8.0
    pytest-cov>=5.0
commands =
    pytest tests/ --ignore=tests/e2e -v --override-ini="addopts=" {posargs}

[testenv:e2e-py{311,312,313}]
description = End-to-end tests ({basepython})
deps =
    pytest>=8.0
commands =
    pytest tests/e2e/ -v --override-ini="addopts=" {posargs}

[testenv:lint]
description = Lint with ruff
skip_install = true
deps =
    ruff>=0.4
commands =
    ruff check src/ tests/

[testenv:typecheck]
description = Type check with mypy
deps =
    mypy>=1.10
commands =
    mypy src/
